name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test (ubuntu)
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version matches tag
        if: github.ref_type == 'tag'
        run: |
          TAG_VER="${{ github.ref_name }}"
          TAG_VER="${TAG_VER#v}"
          CARGO_VER="$(grep '^version = ' ash/Cargo.toml | sed 's/version = "\(.*\)"/\1/')"
          if [ "$TAG_VER" != "$CARGO_VER" ]; then
            echo "::error::Cargo.toml version ($CARGO_VER) does not match tag version ($TAG_VER)"
            exit 1
          fi
      - run: cargo build --verbose
      - run: cargo test --verbose
      - name: Generate docs
        working-directory: ./
        run: |
          npm install --prefix docs
          node docs/assemble.js
      - name: Commit generated docs
        run: |
          git config user.name "ash CI"
          git config user.email "ci@ash-lang.com"
          git add "${{ github.workspace }}/README.md" \
              "${{ github.workspace }}/npm-package/README.md" \
              "${{ github.workspace }}/ash-vscode/README.md" \
              "${{ github.workspace }}/web-site/reference.html" \
              "${{ github.workspace }}/web-site/src/content/reference-content.html" \
              "${{ github.workspace }}/docs/website-reference.md"
          git diff --cached --quiet || git commit -m "sync generated docs [skip ci]"

  release:
    name: Release (${{ matrix.target }})
    if: github.ref_type == 'tag'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ash
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ash
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ash
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ash.exe
    defaults:
      run:
        working-directory: ash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Sync Cargo.toml version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          sed -i 's/^version = ".*"/version = "'"$VER"'"/' Cargo.toml
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ash/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  github-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Prepare binaries
        run: |
          mkdir dist
          cp x86_64-unknown-linux-gnu/ash dist/ash-linux-x64
          cp x86_64-apple-darwin/ash dist/ash-darwin-x64
          cp aarch64-apple-darwin/ash dist/ash-darwin-arm64
          cp x86_64-pc-windows-msvc/ash.exe dist/ash-win-x64.exe
      - name: Generate changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --oneline > dist/CHANGELOG.txt
      - uses: softprops/action-gh-release@v2
        with:
          body_path: dist/CHANGELOG.txt
          files: |
            dist/ash-linux-x64
            dist/ash-darwin-x64
            dist/ash-darwin-arm64
            dist/ash-win-x64.exe

  npm-publish:
    name: Publish npm
    if: github.ref_type == 'tag'
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync version from tag and publish
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          cd npm-package
          npm version "$VER" --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-website:
    name: Deploy Website
    if: github.ref_type == 'tag'
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          cd ash-wasm
          wasm-pack build --target web --release
          mkdir -p ../web-site/public/wasm
          cp pkg/*.wasm ../web-site/public/wasm/
          cp pkg/*.js ../web-site/public/wasm/

      - name: Generate docs
        run: |
          npm install --prefix docs
          node docs/assemble.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          wrangler d1 migrations apply ash-website-db --config web-site/wrangler.toml

      - name: Install and test
        working-directory: web-site
        run: |
          npm ci
          npm test

      - name: Build Astro
        working-directory: web-site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          wrangler pages deploy web-site/dist --project-name=green-band-aooriwu --branch main
