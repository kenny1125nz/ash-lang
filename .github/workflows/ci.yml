name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test (ubuntu)
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --verbose
      - run: cargo test --verbose

  release:
    name: Release (${{ matrix.target }})
    if: github.ref_type == 'tag'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ash
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ash
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ash
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ash.exe
    defaults:
      run:
        working-directory: ash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ash/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  github-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Prepare binaries
        run: |
          mkdir dist
          cp x86_64-unknown-linux-gnu/ash dist/ash-linux-x64
          cp x86_64-apple-darwin/ash dist/ash-darwin-x64
          cp aarch64-apple-darwin/ash dist/ash-darwin-arm64
          cp x86_64-pc-windows-msvc/ash.exe dist/ash-win-x64.exe
      - name: Generate changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --oneline > dist/CHANGELOG.txt
      - uses: softprops/action-gh-release@v2
        with:
          body_path: dist/CHANGELOG.txt
          files: |
            dist/ash-linux-x64
            dist/ash-darwin-x64
            dist/ash-darwin-arm64
            dist/ash-win-x64.exe

  npm-publish:
    name: Publish npm
    if: github.ref_type == 'tag'
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync version from tag and publish
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          cd npm-package
          npm version "$VER" --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-website:
    name: Deploy Website
    if: github.ref_type == 'tag'
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: |
          cd ash-wasm
          wasm-pack build --target web --release
          mkdir -p ../web-site/wasm
          cp pkg/ash_wasm.js ../web-site/wasm/ash.js
          cp pkg/ash_wasm_bg.wasm ../web-site/wasm/ash_wasm_bg.wasm
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          wrangler pages deploy web-site --project-name=green-band-aooriwu --production
