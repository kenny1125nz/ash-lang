daemon:
  log_level: debug
  ws_listen: "127.0.0.1:9877"
  grace_period_secs: 30

sources:
  - type: folder
    name: watch-invoices
    path: /tmp/ashd-test/incoming
    concurrency: parallel
    workflows:
      - path: ./workflows/process-invoice
        flags: ["--agent", "opencode:sonnet", "--yes"]

